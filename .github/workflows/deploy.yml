name: Deploy to Cloudflare Workers

# Auto-deploy the Python Worker + static assets whenever master moves
# (i.e. after a PR merges), plus a manual "Run workflow" button.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish rather than
# cancelling it half-way.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: gate deploys behind a GitHub "production" environment so you can
    # add required reviewers / scope the Cloudflare secrets to it.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22: workers-py's Pyodide shim passes --experimental-wasm-stack-switching,
      # which was removed in Node 24+. Stay on the 20–22 LTS line.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies (wrangler + tailwindcss)
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Set up uv (Python tooling)
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Deploy with pywrangler
        run: uv run pywrangler deploy
        env:
          # Create these in repo (or "production" environment) → Settings → Secrets.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
